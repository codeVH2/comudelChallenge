services:
  db:
    image: postgres:16-alpine
    container_name: comudel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: comudel
      POSTGRES_PASSWORD: comudel
      POSTGRES_DB: comudel
    ports:
      - "5432:5432"
    volumes:
      - comudel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comudel -d comudel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  comudel-pgdata:
